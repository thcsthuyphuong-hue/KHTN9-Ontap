<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH KẾT QUẢ KIỂM TRA</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px
}

h2{
margin-bottom:10px
}

.controls{
margin-bottom:15px;
display:flex;
gap:10px;
flex-wrap:wrap
}

input,select{
padding:6px
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer
}

.btn-excel{
background:#2e7d32;
color:white
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#0d47a1;
color:white
}

.stat-box{
margin-top:15px;
font-weight:bold
}

canvas{
background:white;
padding:10px;
margin-top:15px
}

</style>
</head>

<body>

<h2>DANH SÁCH KẾT QUẢ KIỂM TRA</h2>

<div class="controls">

<input id="search-sbd" placeholder="Tìm SBD">

<select id="filter-class">
<option value="">Tất cả lớp</option>
</select>

<button class="btn-excel" onclick="exportExcel()">Xuất Excel</button>

</div>

<div class="stat-box">
<span id="stat-total"></span> |
<span id="stat-pass"></span> |
<span id="stat-fail"></span>
</div>

<table id="result-table">

<thead>
<tr>
<th>SBD</th>
<th>Họ và tên</th>
<th>Lớp</th>
<th>Điểm</th>
<th>Thời gian làm bài</th>
<th>Thời gian nộp</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

<canvas id="scoreChart" height="120"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "khtn9-5c1f4.firebaseapp.com",
projectId: "khtn9-5c1f4",
storageBucket: "khtn9-5c1f4.firebasestorage.app",
messagingSenderId: "498407772914",
appId: "1:498407772914:web:d20ee46cdedd817142366b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData=[];

async function loadData(){

const snapshot = await getDocs(collection(db,"ketqua"));

snapshot.forEach(doc=>{

const d = doc.data();

let tg="";

if(d.thoigian_nopbai){
tg=d.thoigian_nopbai.toDate().toLocaleString("vi-VN");
}

let diem = Number(d.diem);

if(isNaN(diem)) diem="";

allData.push({
sbd:d.sobaodanh||"",
ten:d.hovaten||"",
lop:d.lop||"",
diem:diem,
time:d.thoigian_lambai||"",
nop:tg
});

});

initClassFilter();
renderTable();
updateStats();
drawChart();

}

loadData();

function initClassFilter(){

const classes=[...new Set(allData.map(x=>x.lop).filter(x=>x))];

const select=document.getElementById("filter-class");

classes.forEach(c=>{
const op=document.createElement("option");
op.value=c;
op.textContent=c;
select.appendChild(op);
});

}

function renderTable(){

const sbdSearch=document.getElementById("search-sbd").value;

const classFilter=document.getElementById("filter-class").value;

const body=document.getElementById("table-body");

body.innerHTML="";

allData
.filter(r=>{
return (!sbdSearch || r.sbd.includes(sbdSearch)) &&
(!classFilter || r.lop===classFilter)
})
.forEach(r=>{

const row=`
<tr>
<td>${r.sbd}</td>
<td>${r.ten}</td>
<td>${r.lop}</td>
<td>${r.diem}</td>
<td>${r.time}</td>
<td>${r.nop}</td>
</tr>
`;

body.innerHTML+=row;

});

}

document.getElementById("search-sbd").oninput=renderTable;
document.getElementById("filter-class").onchange=renderTable;

function updateStats(){

let pass=0;
let fail=0;

allData.forEach(r=>{

if(!isNaN(r.diem)){
if(r.diem>=4) pass++;
else fail++;
}

});

document.getElementById("stat-total").innerText="Tổng bài: "+allData.length;
document.getElementById("stat-pass").innerText="Đạt: "+pass;
document.getElementById("stat-fail").innerText="Chưa đạt: "+fail;

}

function drawChart(){

let bins=[0,0,0,0,0,0,0];

allData.forEach(r=>{

if(!isNaN(r.diem)){
let s=Math.floor(r.diem);
if(s>=0 && s<=6) bins[s]++;
}

});

new Chart(document.getElementById("scoreChart"),{
type:"bar",
data:{
labels:["0","1","2","3","4","5","6+"],
datasets:[{
label:"Phân bố điểm",
data:bins,
backgroundColor:"#1976d2"
}]
}
});

}

window.exportExcel=function(){

let data=[...allData];

data.sort((a,b)=>{
if(a.lop===b.lop) return Number(a.sbd)-Number(b.sbd);
return a.lop.localeCompare(b.lop);
});

let sum=0;
let count=0;

data.forEach(r=>{
if(!isNaN(r.diem)){
sum+=Number(r.diem);
count++;
}
});

let avg=(sum/count).toFixed(2);

data.push({
sbd:"",
ten:"TRUNG BÌNH",
lop:"",
diem:avg,
time:"",
nop:""
});

const ws=XLSX.utils.json_to_sheet(data,{
header:["sbd","ten","lop","diem","time","nop"]
});

XLSX.utils.sheet_add_aoa(ws,[[
"SBD","Họ và tên","Lớp","Điểm","Thời gian làm bài","Thời gian nộp"
]],{origin:"A1"});

ws["!cols"]=[
{wch:10},
{wch:25},
{wch:10},
{wch:10},
{wch:18},
{wch:22}
];

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Ketqua");

XLSX.writeFile(wb,"ketqua_khtn9.xlsx");

}

</script>

</body>
</html>
