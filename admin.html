
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH KẾT QUẢ KIỂM TRA</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center
}

th{
background:#0d47a1;
color:white
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer
}

.btn-excel{
background:#2e7d32;
color:white;
margin-bottom:15px
}

</style>
</head>

<body>

<h2>DANH SÁCH KẾT QUẢ KIỂM TRA</h2>

<button class="btn-excel" onclick="exportExcel()">Xuất Excel</button>

<table id="result-table">

<thead>
<tr>
<th>SBD</th>
<th>Họ và tên</th>
<th>Lớp</th>
<th>Điểm</th>
<th>Thời gian làm bài (s)</th>
  <th>Thời gian nộp bài</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "khtn9-5c1f4.firebaseapp.com",
projectId: "khtn9-5c1f4",
storageBucket: "khtn9-5c1f4.firebasestorage.app",
messagingSenderId: "498407772914",
appId: "1:498407772914:web:d20ee46cdedd817142366b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
async function loadData(){

const querySnapshot = await getDocs(collection(db,"ketqua"));

querySnapshot.forEach((doc)=>{

const d = doc.data();

let tgNop = "";

if(d.thoigian_nopbai){
const date = d.thoigian_nopbai.toDate();
tgNop = date.toLocaleString("vi-VN");
}
const row = `
<tr>
<td>${d.sobaodanh}</td>
<td>${d.hovaten}</td>
<td>${d.lop || ""}</td>
<td>${d.diem}</td>
<td>${d.thoigian_lambai}</td>
<td>${tgNop}</td>
</tr>
`;
document.getElementById("table-body").innerHTML += row;
});
}
loadData();
</script>
<script>
function exportExcel(){
const table = document.getElementById("result-table");

const wb = XLSX.utils.table_to_book(table,{sheet:"Ketqua"});

XLSX.writeFile(wb,"ketqua_khtn9.xlsx");

}
</script>
</body>
</html>
